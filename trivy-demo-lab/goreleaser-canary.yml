project_name: trivy

before:
  hooks:
    - go mod tidy

builds:
  - id: trivy-canary
    main: ./cmd/trivy
    binary: trivy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X github.com/aquasecurity/trivy/pkg/version.Version={{.Version}}-canary

archives:
  - id: trivy-canary
    name_template: "{{ .ProjectName }}_{{ .Version }}_canary_{{ .Os }}_{{ .Arch }}"
    format: tar.gz

snapshot:
  name_template: "{{ incpatch .Version }}-canary"
