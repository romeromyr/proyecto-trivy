project_name: trivy

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: trivy
    main: ./cmd/trivy
    binary: trivy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - "386"
    ldflags:
      - -s -w
      - -X github.com/aquasecurity/trivy/pkg/version.Version={{.Version}}

archives:
  - id: trivy
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}-
      {{- if eq .Arch "amd64" }}64bit
      {{- else if eq .Arch "386" }}32bit
      {{- else }}{{ .Arch }}{{ end }}
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.crt"
    args:
      - sign-blob
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - ${artifact}
    artifacts: all
