name: Secure Scan - Verify Image Integrity

on:
  workflow_dispatch:
    inputs:
      expected_digest:
        description: 'SHA256 digest esperado (ej: sha256:abc123...)'
        required: true
        type: string

jobs:
  verify-and-scan:
    runs-on: self-hosted
    steps:
      - name: Pull image from registry
        run: |
          docker pull localhost:5000/lab/trivy-demo:1.0

      - name: Verify image integrity with SHA256 digest
        shell: bash
        run: |
          echo "=========================================="
          echo "VERIFICACION DE INTEGRIDAD - PIPELINE CI/CD"
          echo "=========================================="

          IMAGE="localhost:5000/lab/trivy-demo:1.0"
          EXPECTED_DIGEST="localhost:5000/lab/trivy-demo@${{ inputs.expected_digest }}"

          echo "[INFO] Imagen a verificar: $IMAGE"
          echo "[INFO] Digest esperado:    $EXPECTED_DIGEST"

          ACTUAL_DIGEST=$(docker inspect $IMAGE --format='{{index .RepoDigests 0}}')

          echo "[INFO] Digest actual:      $ACTUAL_DIGEST"
          echo "------------------------------------------"

          if [ "$ACTUAL_DIGEST" == "$EXPECTED_DIGEST" ]; then
              echo "[PASS] DIGEST COINCIDE"
              echo "[PASS] Imagen verificada. Ejecucion permitida."
              exit 0
          else
              echo "[FAIL] ALERTA: DIGEST NO COINCIDE"
              echo "[FAIL] La imagen puede haber sido alterada!"
              echo "[FAIL] Ejecucion BLOQUEADA."
              exit 1
          fi

      - name: Run Trivy scan (only if verification passed)
        if: success()
        run: |
          docker run --rm \
            -e AWS_ACCESS_KEY_ID=fake_aws_key_12345 \
            -e AWS_SECRET_ACCESS_KEY=fake_aws_secret_67890 \
            -e DATABASE_PASSWORD=fake_db_password_zapier \
            -e GITHUB_TOKEN=fake_github_token_zapier \
            localhost:5000/lab/trivy-demo:1.0
