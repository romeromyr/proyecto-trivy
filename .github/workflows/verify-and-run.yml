name: Secure Scan - Verify Image Integrity

on:
  workflow_dispatch:
    inputs:
      expected_digest:
        description: 'SHA256 digest esperado (ej: sha256:abc123...)'
        required: true
        type: string

jobs:
  verify-and-scan:
    runs-on: self-hosted
    steps:
      - name: Pull image from registry
        shell: powershell
        run: |
          docker pull localhost:5000/lab/trivy-demo:1.0

      - name: Verify image integrity with SHA256 digest
        shell: powershell
        env:
          EXPECTED_DIGEST_INPUT: ${{ inputs.expected_digest }}
        run: |
          Write-Host "=========================================="
          Write-Host "VERIFICACION DE INTEGRIDAD - PIPELINE CI/CD"
          Write-Host "=========================================="

          $IMAGE = "localhost:5000/lab/trivy-demo:1.0"
          
          # Obtener el digest esperado desde variable de entorno
          $EXPECTED_FULL = $env:EXPECTED_DIGEST_INPUT
          $ACTUAL_FULL = docker inspect $IMAGE --format='{{index .RepoDigests 0}}'

          Write-Host "[INFO] Imagen a verificar: $IMAGE"
          Write-Host "[INFO] Digest esperado:    $EXPECTED_FULL"
          Write-Host "[INFO] Digest actual:      $ACTUAL_FULL"

          # Extraer solo el hash (quitar todo lo que no sea hex)
          $EXPECTED_HASH = ($EXPECTED_FULL -replace ".*sha256:","").Trim()
          $ACTUAL_HASH = ($ACTUAL_FULL -replace ".*sha256:","").Trim()

          Write-Host "[DEBUG] Hash esperado: '$EXPECTED_HASH'"
          Write-Host "[DEBUG] Hash actual:   '$ACTUAL_HASH'"
          Write-Host "[DEBUG] Long esperado: $($EXPECTED_HASH.Length)"
          Write-Host "[DEBUG] Long actual:   $($ACTUAL_HASH.Length)"

          if ($EXPECTED_HASH -eq $ACTUAL_HASH) {
              Write-Host "[PASS] DIGEST COINCIDE"
              Write-Host "[PASS] Imagen verificada. Ejecucion permitida."
              exit 0
          } else {
              Write-Host "[FAIL] ALERTA: DIGEST NO COINCIDE"
              Write-Host "[FAIL] La imagen puede haber sido alterada!"
              Write-Host "[FAIL] Ejecucion BLOQUEADA."
              exit 1
          }

      - name: Run Trivy scan (only if verification passed)
        if: success()
        shell: powershell
        run: |
          docker run --rm `
            -e AWS_ACCESS_KEY_ID=fake_aws_key_12345 `
            -e AWS_SECRET_ACCESS_KEY=fake_aws_secret_67890 `
            -e DATABASE_PASSWORD=fake_db_password_zapier `
            -e GITHUB_TOKEN=fake_github_token_zapier `
            localhost:5000/lab/trivy-demo:1.0
