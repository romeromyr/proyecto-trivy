name: Secure Scan - Verify Image Integrity

on:
  workflow_dispatch:
    inputs:
      expected_digest:
        description: 'SHA256 digest esperado (ej: sha256:abc123...)'
        required: true
        type: string

jobs:
  verify-and-scan:
    runs-on: self-hosted
    steps:
      - name: Pull image from registry
        shell: cmd
        run: docker pull localhost:5000/lab/trivy-demo:1.0

      - name: Verify image integrity with SHA256 digest
        shell: cmd
        run: |
          echo ==========================================
          echo VERIFICACION DE INTEGRIDAD - PIPELINE CI/CD
          echo ==========================================
          set IMAGE=localhost:5000/lab/trivy-demo:1.0
          set EXPECTED=localhost:5000/lab/trivy-demo@${{ inputs.expected_digest }}
          echo [INFO] Imagen a verificar: %IMAGE%
          echo [INFO] Digest esperado:    %EXPECTED%
          for /f "tokens=*" %%a in ('docker inspect %IMAGE% --format={{index .RepoDigests 0}}') do set ACTUAL=%%a
          echo [INFO] Digest actual:      %ACTUAL%
          echo ------------------------------------------
          if "%ACTUAL%"=="%EXPECTED%" (
              echo [PASS] DIGEST COINCIDE
              echo [PASS] Imagen verificada. Ejecucion permitida.
              exit /b 0
          ) else (
              echo [FAIL] ALERTA: DIGEST NO COINCIDE
              echo [FAIL] La imagen puede haber sido alterada!
              echo [FAIL] Ejecucion BLOQUEADA.
              exit /b 1
          )

      - name: Run Trivy scan (only if verification passed)
        if: success()
        shell: cmd
        run: docker run --rm -e AWS_ACCESS_KEY_ID=fake_aws_key_12345 -e AWS_SECRET_ACCESS_KEY=fake_aws_secret_67890 -e DATABASE_PASSWORD=fake_db_password_zapier -e GITHUB_TOKEN=fake_github_token_zapier localhost:5000/lab/trivy-demo:1.0
